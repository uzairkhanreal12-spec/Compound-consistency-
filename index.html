<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BHAW - PERSONAL WAR ROOM</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body { background:#050505; color:#eee; font-family:'Segoe UI', sans-serif; text-align:center; padding:20px; min-height:100vh; }
  h2 { color:#00ff88; font-size:22px; margin-bottom:10px; }
  #streak { font-size:28px; color:#ffd700; margin:10px; font-weight:bold; }
  #stats { display:flex; justify-content:space-around; gap:10px; margin:20px 0; flex-wrap:wrap; }
 .card { background:#111; padding:15px; border-radius:10px; width:30%; min-width:100px; border:1px solid #222; }
 .growth { color:#00ff88; } .failure { color:#ff0044; } .day { color:#00aaff; }
  #graph { width:100%; max-width:700px; height:300px; border:2px solid #222; background:#0a0a0a; border-radius:12px; margin:0 auto; }
  #timer { margin-top:15px; font-size:22px; font-weight:bold; color:#00ff88; }
  .btns{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:15px;}
  button { background:#00ff88; color:#000; border:none; padding:12px 20px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:15px; }
  button:active{transform:scale(0.95)}
  #quote { margin-top:20px; font-style:italic; color:#aaa; font-size:16px; }
</style>
</head>
<body>
<h2>⚡ BHAW PERSONAL WAR ROOM ⚡</h2>
<div id="streak">🔥 STREAK: 0 DIN</div>

<div id="stats">
  <div class="card"><h3 class="day">AJ KA DIN</h3><h1 id="d">1</h1></div>
  <div class="card"><h3 class="growth">GROWTH</h3><h1 id="g">0</h1></div>
  <div class="card"><h3 class="failure">FAILURE</h3><h1 id="f">0</h1></div>
</div>

<canvas id="graph" width="700" height="300"></canvas>
<div id="timer">Next Beep: 05:00</div>
<div class="btns">
  <button onclick="addGrowth()">+ GROWTH</button>
  <button onclick="addFailure()">+ FAILURE</button>
  <button onclick="Notification.requestPermission()">🔔 ALERT ON</button>
</div>
<div id="quote"></div>

<script>
let c = document.getElementById('graph').getContext('2d');
let saved = JSON.parse(localStorage.getItem('warRoom_bhaw')) || {g:0,f:0,d:1,streak:0,lastDate:'',x:0};
let gc=saved.g, fc=saved.f, day=saved.d, streak=saved.streak, x=saved.x, time=300;
let quotes = ["Main Consistent hun", "Main Workaholic hun", "Main Discipline hun", "Main Fast Mover hun", "Main Achiever hun", "1 Din = 1% Better"];

function saveData(){
  localStorage.setItem('warRoom_bhaw', JSON.stringify({g:gc,f:fc,d:day,streak:streak,lastDate:new Date().toDateString(),x:x}));
}

function updateUI(){
  document.getElementById('g').innerText=gc; 
  document.getElementById('f').innerText=fc;
  document.getElementById('d').innerText=day; 
  document.getElementById('streak').innerText=`🔥 STREAK: ${streak} DIN`;
  document.getElementById('quote').innerText = quotes[Math.floor(Math.random()*quotes.length)];
  saveData();
}

function drawDot(color, y){
  c.fillStyle=color; 
  c.beginPath(); 
  c.arc(x, y, 6, 0, 6.28); 
  c.fill();
  x+=8; if(x>690) x=10;
}

function addGrowth(){ gc++; drawDot('#00ff88', 80); updateUI(); }
function addFailure(){ fc++; drawDot('#ff0044', 220); updateUI(); }

function checkNewDay(){
  let today = new Date().toDateString();
  if(saved.lastDate && saved.lastDate !== today){
    if(gc > fc){ streak++; } else { if(streak>0) streak=0; }
    day++; gc=0; fc=0; x=10; c.clearRect(0,0,700,300);
  }
}

setInterval(()=>{
  checkNewDay();
  let m = Math.floor(time/60); let s = time%60;
  document.getElementById('timer').innerText=`Next Beep: 0${m}:${s<10?'0':''}${s}`;
  time--; 
  if(time<0){
    if(Notification.permission === "granted"){
      new Notification("KAAM KAR LE BHAW! 💪", {body:"5 min ho gaye. Growth dot lagao"});
    }
    addGrowth();
    time=300;
  }
},1000);

for(let i=0; i<gc; i++) drawDot('#00ff88', 80);
for(let i=0; i<fc; i++) drawDot('#ff0044', 220);
updateUI();
</script>
</body>
</html>
